<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiket Acara</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/tiket.css">
</head>
<body>

    <!-- ====================== -->
    <!-- HEADER -->
    <!-- ====================== -->
    <header class="header">
        <h1>E-Tiket Acara</h1>
        <a href="index.html" class="btn-back">Kembali ke Beranda</a>
    </header>

    <!-- ====================== -->
    <!-- TIKET CONTAINER -->
    <!-- ====================== -->
    <div class="ticket-container">

        <h2>Tiket Kamu</h2>

        <div id="ticketBox" class="ticket-box">
            <p>Memuat tiket...</p>
        </div>

    </div>

    <!-- ====================== -->
    <!-- SCRIPT DINAMIS -->
    <!-- ====================== -->
    <script>
        // Ambil parameter URL
        const p = new URLSearchParams(window.location.search);
        const id = p.get("id");
        const nama = p.get("nama");
        const email = p.get("email");
        const jumlah = parseInt(p.get("jumlah"));

        // Data event (sama seperti sebelumnya)
        const eventData = {
            "seminar-teknologi": { title: "Seminar Teknologi", price: 20000 },
            "workshop-uiux": { title: "Workshop UI/UX", price: 30000 },
            "konser-musik": { title: "Konser Musik Kampus", price: 50000 },
            "festival-budaya": { title: "Festival Budaya Nusantara", price: 15000 },
            "turnamen-esport": { title: "Turnamen E-Sport Kampus", price: 35000 },
            "seminar-karir": { title: "Seminar Karir & CV Building", price: 10000 }
        };

        // Validasi
        if (!id || !eventData[id]) {
            document.body.innerHTML = "<h1>ACARA TIDAK DITEMUKAN</h1>";
        }

        const eventTitle = eventData[id].title;

        // Fake QR Code (dummy untuk tugas)
        const qrText = `EVENT:${eventTitle}|NAMA:${nama}|EMAIL:${email}|JUMLAH:${jumlah}`;

        // Generate QR dummy (kotak hitam putih random)
        function generateFakeQR(seed) {
            let size = 180;
            let canvas = document.createElement("canvas");
            canvas.width = size;
            canvas.height = size;
            let ctx = canvas.getContext("2d");

            for (let y = 0; y < size; y += 10) {
                for (let x = 0; x < size; x += 10) {
                    let val = (x * y + seed.length) % 2 === 0;
                    ctx.fillStyle = val ? "#000" : "#fff";
                    ctx.fillRect(x, y, 10, 10);
                }
            }

            return canvas.toDataURL();
        }

        const qrImg = generateFakeQR(qrText);

        // Masukkan data ke tiket
        const box = document.getElementById("ticketBox");
        box.innerHTML = `
            <div class="ticket">
                <h3>${eventTitle}</h3>

                <p><strong>Nama Pemesan:</strong> ${nama}</p>
                <p><strong>Email:</strong> ${email}</p>
                <p><strong>Jumlah Tiket:</strong> ${jumlah}</p>

                <div class="qr-wrapper">
                    <img src="img/qr.png" alt="QR Code" class="qr-code">
                </div>

                <p class="note">Tunjukkan QR ini saat masuk venue.</p>
            </div>
        `;
    </script>

</body>
</html>
