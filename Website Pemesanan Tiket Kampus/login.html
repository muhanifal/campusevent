<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Poppins', sans-serif;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        .login-box {
            width: 100%;
            padding: 30px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        .login-box h2 {
            color: #333;
            margin-bottom: 25px;
            font-weight: 600;
        }
        input {
            width: 100%; 
            padding: 14px; 
            margin-top: 10px;
            border-radius: 8px; 
            border: 1px solid #ddd;
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
        }
        button { 
            width: 100%; 
            padding: 14px; 
            margin-top: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .btn-back {
            display: inline-block;
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #f1f5f9;
            color: #475569;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }
        .btn-back:hover {
            background: #e2e8f0;
            color: #1e293b;
        }
        .error { 
            color: #ef4444; 
            margin-top: 15px;
            font-size: 14px;
            padding: 10px;
            background: #fef2f2;
            border-radius: 6px;
            border-left: 4px solid #ef4444;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-box">
        <div class="logo">CampusEvent Admin</div>
        <h2>Login Admin</h2>

        <input type="text" id="user" placeholder="Username" autocomplete="username">
        <input type="password" id="pass" placeholder="Password" autocomplete="current-password">
        <button onclick="login()">Login</button>

        <a href="index.html" class="btn-back">← Kembali ke Beranda</a>

        <p id="err" class="error"></p>
    </div>
</div>

<script>
// Cek jika sudah login
if (localStorage.getItem("adminLogin") === "true") {
    window.location.href = "admin.html";
}

function login() {
    const u = document.getElementById("user").value.trim();
    const p = document.getElementById("pass").value.trim();

    if (!u || !p) {
        document.getElementById("err").textContent = "Username dan password harus diisi!";
        return;
    }

    if (u === "admin" && p === "kelompok4pbw") {
        localStorage.setItem("adminLogin", "true");
        window.location.href = "admin.html";
    } else {
        document.getElementById("err").textContent = "Username atau password salah!";
        // Clear password field
        document.getElementById("pass").value = "";
        // Focus on password field
        document.getElementById("pass").focus();
    }
}

// Enter key support
document.getElementById("pass").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        login();
    }
});

// Focus on username field when page loads
window.onload = function() {
    document.getElementById("user").focus();
}
</script>

</body>
</html>
