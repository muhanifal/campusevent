<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesan Tiket - CampusEvent</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/pesan.css">
</head>
<body>

    <!-- ====================== -->
    <!-- HEADER -->
    <!-- ====================== -->
    <header class="header">
        <h1>Pesan Tiket Acara</h1>
        <a href="acara.html" class="btn-back">Kembali ke Acara</a>
    </header>

    <!-- ====================== -->
    <!-- FORM PEMESANAN -->
    <!-- ====================== -->
    <div class="pesan-container">
        <h2 id="eventTitle">Memuat...</h2>
        <p id="eventPrice">Harga: -</p>

        <form id="formPesan">
            <label for="nama">Nama Lengkap</label>
            <input type="text" id="nama" placeholder="Masukkan nama lengkap" required>

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Masukkan email aktif" required>

            <label for="jumlah">Jumlah Tiket</label>
            <input type="number" id="jumlah" value="1" min="1" required>

            <input type="hidden" id="eventId">

            <button type="submit" class="btn-primary">Lanjut ke Checkout</button>
        </form>
    </div>

    <!-- ====================== -->
    <!-- SCRIPT DINAMIS -->
    <!-- ====================== -->
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const eventId = urlParams.get("id");

        const eventData = {
            "seminar-teknologi": { title: "Seminar Teknologi", price: 20000 },
            "workshop-uiux": { title: "Workshop UI/UX", price: 30000 },
            "konser-musik": { title: "Konser Musik Kampus", price: 50000 },
            "festival-budaya": { title: "Festival Budaya Nusantara", price: 15000 },
            "turnamen-esport": { title: "Turnamen E-Sport Kampus", price: 35000 },
            "seminar-karir": { title: "Seminar Karir & CV Building", price: 10000 },
            "seminar-startup": { title: "Seminar Startup & Bisnis", price: 25000 },
            "workshop-python": { title: "Workshop Python & AI", price: 40000 },
            "konser-band": { title: "Konser Band Mahasiswa", price: 45000 },
            "hackathon": { title: "Hackathon Kampus", price: 30000 },
            "seminar-inovasi": { title: "Seminar Inovasi Kampus", price: 20000 },
            "workshop-design": { title: "Workshop Desain Grafis", price: 35000 }
        };


        if (eventId && eventData[eventId]) {
            document.getElementById("eventTitle").textContent = eventData[eventId].title;
            document.getElementById("eventPrice").textContent =
                "Harga: Rp " + eventData[eventId].price.toLocaleString();
            document.getElementById("eventId").value = eventId;
        } else {
            document.body.innerHTML = "<h1>ACARA TIDAK DITEMUKAN</h1>";
        }

        document.getElementById("formPesan").addEventListener("submit", function(e){
            e.preventDefault();
            const nama = document.getElementById("nama").value;
            const email = document.getElementById("email").value;
            const jumlah = document.getElementById("jumlah").value;

            window.location.href =
                `checkout.html?id=${eventId}&nama=${encodeURIComponent(nama)}&email=${encodeURIComponent(email)}&jumlah=${jumlah}`;
        });

        if (eventId && eventData[eventId]) {
            const titleEl = document.getElementById("eventTitle");
            const priceEl = document.getElementById("eventPrice");
            const formEl = document.getElementById("formPesan");

            titleEl.textContent = eventData[eventId].title;
            priceEl.textContent = "Harga: Rp " + eventData[eventId].price.toLocaleString();
            document.getElementById("eventId").value = eventId;

            // Tambahkan class animasi staggered
            titleEl.classList.add("fade-up", "delay-1");
            priceEl.classList.add("fade-up", "delay-2");
            formEl.classList.add("fade-up", "delay-3");
        }

    </script>

</body>
</html>
